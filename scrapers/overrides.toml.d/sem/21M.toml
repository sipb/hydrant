description = "This class will cover an extensive range of topics that relate to sound and vibration analysis, focusing on computational tools needed to process such data, and exploring applications in various disciplines. Material covered will include basic signal processing, vibration and acoustical simulations and measurements, machine learning audio, microphone and speaker arrays, signal enhancement and restoration, and psychoacoustics. Applications will be drawn from fields including music, phonetics, mechanical and electrical engineering, architecture, medicine, and more. This class will cover applications such as 3D audio, classifiers for sound events, basic speech recognition, auto-tuners and other music production tools, audio compression, modeling of voice, instruments and rooms, real-time audio applications, denoising and source separation, and how to localize and isolate sounds. Students taking the graduate version will complete additional assignments."
name = "Studies in Music Technology: Audio Computing: Processing Sound in Engineering, Science, and the Arts"
inCharge = "Mark Rau & Paris Smaragdis"

